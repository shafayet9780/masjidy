# Local Supabase config — run `supabase init` to replace with generated file

[api]
enabled = true

# Internal / webhook functions use shared secrets instead of end-user JWTs.
[functions.on-submission-insert]
verify_jwt = false

[functions.update-contributor-tier]
verify_jwt = false

[functions.decay-trust-scores]
verify_jwt = false

[functions.register-token]
verify_jwt = true

[functions.schedule-notifications]
verify_jwt = false

[functions.deliver-notification]
verify_jwt = false

[functions.check-in]
verify_jwt = true

[functions.confirm-mosque]
verify_jwt = true

[functions.on-checkin-insert]
verify_jwt = false

[functions.on-confirmation-insert]
verify_jwt = false
